    function renderTabs(activeId){
      const tabs = document.getElementById("tabs");
      const items = [...days.map(d => [d.id, d.tab]), ["info", "資訊頁"]];
      tabs.innerHTML = items.map(([id,label]) => `<button class="tab ${id===activeId ? "active" : ""}" onclick="setTab('${id}')">${label}</button>`).join("");
    }

    function renderDay(day){
      return `<section class="panel active"><div class="day-layout">
        <aside class="day-brief">
          <span class="date-badge">◇ ${day.date}</span>
          <h2>${day.title}</h2>
          <p class="brief-text">${day.routeNote}</p>
          <div class="brief-grid">
            <div class="brief-item"><b>當日天氣</b>${day.weather}</div>
            <div class="brief-item"><b>車程總量</b>${day.driveTotal}</div>
            <div class="brief-item"><b>主要區域</b>${day.base}</div>
          </div>
          <a class="weather-link" href="${cwaLink}" target="_blank" rel="noreferrer">中央氣象署縣市預報 →</a>
        </aside>
        <section class="timeline">
          ${day.stops.map(stop => `<article class="stop">
            <div class="stop-time">${stop[0]}</div>
            <div class="stop-card">
              <div class="stop-top"><span class="chip">${stop[1]}</span><span class="chip">${stop[4]}</span></div>
              <h3>${stop[2]}</h3>
              <div class="place">${stop[3]}</div>
              <p class="memo">${stop[6]}</p>
              <a class="map" href="${mapLink(stop[5])}" target="_blank" rel="noreferrer">Google Map ↗</a>
            </div>
          </article>`).join("")}
        </section>
      </div></section>`;
    }

    function renderInfo(){
      const row = item => `<div class="info-row"><div class="info-name">${item[0]}</div><div class="info-detail">${item[2]}<small>地址／定位：${item[1]}</small><a href="${mapLink(item[1])}" target="_blank" rel="noreferrer">開啟 Google Maps 查地址 ↗</a></div></div>`;
      return `<section class="panel active">
        <div class="info-head">
          <h2>住宿與餐廳地址資訊</h2>
          <p>我已改成可直接查地址的資訊頁：每筆住宿與餐廳都提供 Google Maps 定位欄位與開啟連結。部分民宿與小店在公開搜尋結果中沒有穩定顯示完整門牌，為避免填錯，實際門牌請以點開後的 Google Maps 店家頁面為準。</p>
        </div>
        <div class="info-grid">
          <article class="info-card"><h3>住宿</h3><div class="info-list">${info.hotels.map(row).join("")}</div></article>
          <article class="info-card"><h3>餐廳／咖啡／甜點</h3><div class="info-list">${info.restaurants.map(row).join("")}</div></article>
        </div>
      </section>`;
    }

    function setTab(id){
      renderTabs(id);
      const content = document.getElementById("content");
      content.innerHTML = id === "info" ? renderInfo() : renderDay(days.find(d => d.id === id));
      window.scrollTo({top:0, behavior:"smooth"});
    }
